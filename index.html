<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 编辑器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="toolbar">
            <div class="toolbar-group">
                <button id="bold-btn" title="粗体 (Ctrl+B)"><strong>B</strong></button>
                <button id="italic-btn" title="斜体 (Ctrl+I)"><em>I</em></button>
                <button id="heading-btn" title="标题">#</button>
                <button id="link-btn" title="链接 (Ctrl+K)">&#128279;</button>
                <button id="image-btn" title="图片 (Ctrl+Shift+I)">&#128444;</button>
                <button id="list-btn" title="列表 (Ctrl+L)">&#9776;</button>
                <button id="code-btn" title="代码块 (Ctrl+Shift+C)">&lt;/&gt;</button>
            </div>
            <div class="toolbar-group">
                <button id="preview-btn" title="预览切换 (Ctrl+P)">&#128065;</button>
                <button id="save-btn" title="保存 (Ctrl+S)">&#128190;</button>
                <button id="open-btn" title="打开 (Ctrl+O)">&#128194;</button>
            </div>
        </header>

        <div class="main-content">
            <main class="editor-container">
                <textarea id="editor" placeholder="在此输入Markdown内容..."></textarea>
            </main>
            <aside class="preview-container">
                <div id="preview"></div>
            </aside>
        </div>

        <footer class="status-bar">
            <div class="status-item">行: 1, 列: 1</div>
            <div class="status-item">字数: 0</div>
            <div class="status-item">阅读时间: 0分钟</div>
        </footer>
    </div>

    <script src="js/marked.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
